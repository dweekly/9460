name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'data/scans/**'
  workflow_run:
    workflows: ['Scheduled RFC 9460 Scan']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Verify and package site
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify deployed data identity and freshness
        run: |
          python -m src.analyzer.pipeline verify \
            --latest docs/data/latest.json \
            --scan-dir data/scans \
            --max-age-hours 48

      - name: Enforce generated artifact size limits
        run: |
          python -m src.analyzer.pipeline check-sizes \
            --scan-dir data/scans \
            --pages-dir docs/data

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload verified site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    name: Deploy verified site
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
