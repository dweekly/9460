name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify generated SvcParam registry
        run: python -m src.registry_codegen --check

      - name: Run Black
        run: black --check --line-length=100 main.py src tests

      - name: Run isort
        run: isort --check-only --profile=black --line-length=100 main.py src tests

      - name: Run Flake8
        run: flake8 --max-line-length=100 --extend-ignore=E203,W503 main.py src tests

      - name: Run MyPy
        run: mypy --strict --ignore-missing-imports src/

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14'
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'pip-audit>=2.10.1'

      - name: Run pip-audit
        run: pip-audit --requirement requirements.txt

  site-data:
    name: Verify published data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify canonical and Pages data agree
        run: |
          python -m src.analyzer.pipeline verify \
            --latest docs/data/latest.json \
            --scan-dir data/scans \
            --max-age-hours 48

      - name: Enforce generated artifact size limits
        run: |
          python -m src.analyzer.pipeline check-sizes \
            --scan-dir data/scans \
            --pages-dir docs/data

      - name: Test dashboard rendering
        run: |
          node --check docs/assets/js/main.js
          node --check docs/assets/js/charts.js
          node tests/dashboard_smoke.js

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [lint, test, site-data]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install 'build>=1.5.1'

      - name: Build package
        run: python -m build

      - name: Smoke-test the installed wheel
        run: |
          wheel_path=$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)
          test -n "${wheel_path}"
          smoke_env="${RUNNER_TEMP}/rfc9460-wheel-smoke"
          python -m venv "${smoke_env}"
          "${smoke_env}/bin/python" -m pip install "${wheel_path}"
          cd "${RUNNER_TEMP}"
          "${smoke_env}/bin/rfc9460-check" --help
          "${smoke_env}/bin/rfc9460-pipeline" --help
          "${smoke_env}/bin/python" -c \
            "from src.cli import load_websites; from src.analyzer.pipeline import load_cohort; assert len(load_websites()) == load_cohort()['count'] == 101"
          "${smoke_env}/bin/python" -m src.registry_codegen --check
          "${smoke_env}/bin/python" -c \
            "import src.rfc9460_checker._generated_svcparam_registry"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
