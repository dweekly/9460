name: Scheduled RFC 9460 Scan

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rfc9460-daily-scan
  cancel-in-progress: false

jobs:
  scan-and-publish:
    name: Scan, build, and publish data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Collect DNS observations
        id: collect
        run: |
          scan_output="${RUNNER_TEMP}/rfc9460-scan"
          mkdir -p "${scan_output}"
          python main.py \
            --websites top_websites.json \
            --output "${scan_output}" \
            --observations-only
          raw_input=$(find "${scan_output}" -maxdepth 1 -type f -name 'rfc9460_observations_*.json' | sort | tail -n 1)
          test -n "${raw_input}"
          echo "raw_input=${raw_input}" >> "${GITHUB_OUTPUT}"

      - name: Build canonical snapshot and Pages data
        run: |
          python -m src.analyzer.pipeline build \
            --input "${{ steps.collect.outputs.raw_input }}" \
            --scan-dir data/scans \
            --pages-dir docs/data \
            --legacy-dir results \
            --cohort top_websites.json

      - name: Verify generated data freshness
        run: |
          python -m src.analyzer.pipeline verify \
            --latest docs/data/latest.json \
            --scan-dir data/scans \
            --max-age-hours 48

      - name: Commit snapshot and public views together
        run: |
          test -s docs/data/latest.json
          test -s docs/data/history.json
          test -s docs/data/changes.json
          test -n "$(find data/scans -maxdepth 1 -type f -name 'rfc9460_scan_*.json.gz' -print -quit)"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/scans docs/data
          if git diff --staged --quiet; then
            echo "The verified scan produced no tracked data changes."
          else
            git commit -m "Update RFC 9460 observations $(date -u +%Y-%m-%d)"
            git push
          fi
